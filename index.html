<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nova Gallery · Imperial Edition</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7e5bef">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.png">
  
  <!-- Tailwind + Inter + Font Awesome (development warnings are normal) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  
  <!-- React & ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone for JSX (development only) -->
  <script src="https://unpkg.com/@babel/standalone@7.22.5/babel.min.js"></script>
  
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #faf8f5; }
    .dark body { background: #0c0a1a; }
    
    /* 👑 ROYAL GLASS */
    .glass-nav { background: rgba(255,245,235,0.75); backdrop-filter: blur(12px) saturate(180%); border-bottom: 1px solid rgba(255,215,0,0.2); }
    .dark .glass-nav { background: rgba(20,10,30,0.85); border-bottom: 1px solid rgba(255,215,0,0.15); }
    
    .glass-modal { background: rgba(255,245,240,0.95); backdrop-filter: blur(24px); border: 1px solid rgba(255,215,0,0.3); box-shadow: 0 30px 50px -20px rgba(106,13,173,0.4); }
    .dark .glass-modal { background: rgba(26,18,38,0.95); border: 1px solid rgba(255,215,0,0.15); }

    .glass-card { background: rgba(255,250,240,0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,215,0,0.25); }
    .dark .glass-card { background: rgba(30,20,45,0.7); border: 1px solid rgba(255,215,0,0.1); }
    
    /* image load animation */
    .img-loading { opacity: 0; transform: scale(1.08); filter: blur(15px); }
    .img-loaded { opacity: 1; transform: scale(1); filter: blur(0); transition: all 0.7s cubic-bezier(0.2,0,0,1); }
    
    .animate-enter { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes fadeUp { 0% { opacity: 0; transform: translateY(16px); } 100% { opacity: 1; transform: translateY(0); } }
    
    /* progress bar for slideshow */
    @keyframes progress { from { width: 0%; } to { width: 100%; } }
    .animate-progress { animation: progress 3s linear forwards; }
    
    /* zoom container */
    .zoom-container { cursor: grab; transition: transform 0.1s ease; transform-origin: center center; }
    .zoom-container.dragging { cursor: grabbing; }
    
    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c1a57b; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #5e4b3c; }
    
    /* favorites zone */
    .favorites-zone { display: flex; gap: 0.75rem; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 0.5rem; }
    .favorites-zone .fav-item { flex: 0 0 110px; scroll-snap-align: start; }
    @media (min-width: 640px) { .favorites-zone .fav-item { flex-basis: 140px; } }
    
    /* premium video controls */
    .video-controls { background: linear-gradient(to top, rgba(60,20,80,0.9), transparent); transition: opacity 0.3s; }
    .video-progress { -webkit-appearance: none; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; background-image: linear-gradient(90deg, #c084fc var(--value, 0%), transparent 0%); }
    .video-progress::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: white; border: 2px solid #c084fc; border-radius: 50%; cursor: pointer; box-shadow: 0 2px 8px black; transition: transform 0.1s; }
    .video-progress::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .volume-slider { -webkit-appearance: none; width: 70px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #c084fc; border-radius: 50%; cursor: pointer; }
    
    /* audio player */
    .audio-player { background: rgba(255,245,235,0.9); backdrop-filter: blur(16px); border-top: 1px solid rgba(212,175,55,0.3); }
    .dark .audio-player { background: rgba(30,20,40,0.9); border-top: 1px solid rgba(212,175,55,0.2); }
    .audio-progress { -webkit-appearance: none; height: 6px; background: #e2d9c0; border-radius: 3px; background-image: linear-gradient(90deg, #c084fc var(--progress, 0%), #e2d9c0 0%); }
    .audio-progress::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: white; border: 2px solid #c084fc; border-radius: 50%; cursor: pointer; }
    .dark .audio-progress { background: #4a3f33; }
    
    /* tooltip */
    .tooltip { position: relative; }
    .tooltip:hover:after { content: attr(aria-label); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #2d1b3c; color: #ffd700; font-size: 10px; padding: 4px 8px; border-radius: 20px; white-space: nowrap; pointer-events: none; margin-bottom: 6px; z-index: 100; border: 1px solid #ffd70033; }
    
    /* selection mode */
    .selection-mode .selectable { @apply ring-2 ring-offset-2 ring-amber-400; }
    .selected-item { @apply ring-4 ring-amber-500 ring-offset-2; }
    .bulk-toolbar { background: linear-gradient(135deg, #2e1b4b, #1a0f2b); border: 1px solid #ffd70040; }
  </style>
</head>
<body class="bg-amber-50/50 text-stone-900 dark:bg-[#0c0a1a] dark:text-amber-100 transition-colors duration-500">
  <div id="root" class="flex flex-col min-h-screen"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('SW registered:', reg))
          .catch(err => console.log('SW failed:', err));
      });
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, createContext, useContext, useMemo } = React;

    // ---------- INDEXED DB ----------
    const DB_NAME = 'NovaGalleryDB';
    const DB_VERSION = 6;
    const STORE_MEDIA = 'uploadedMedia';
    const STORE_THUMBS = 'uploadedThumbnails';
    const STORE_AUDIO = 'uploadedAudio';

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_MEDIA)) db.createObjectStore(STORE_MEDIA, { keyPath: 'filename' });
          if (!db.objectStoreNames.contains(STORE_THUMBS)) db.createObjectStore(STORE_THUMBS, { keyPath: 'album' });
          if (!db.objectStoreNames.contains(STORE_AUDIO)) db.createObjectStore(STORE_AUDIO, { keyPath: 'id' });
        };
      });
    }

    async function getAllFromStore(storeName) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const store = tx.objectStore(storeName);
        const request = store.getAll();
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
        tx.oncomplete = () => db.close();
      });
    }

    async function putItemInStore(storeName, item) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        store.put(item);
        tx.oncomplete = () => { db.close(); resolve(); };
        tx.onerror = () => { db.close(); reject(tx.error); };
      });
    }

    async function removeItemFromStore(storeName, key) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        store.delete(key);
        tx.oncomplete = () => { db.close(); resolve(); };
        tx.onerror = () => { db.close(); reject(tx.error); };
      });
    }

    const getAllAudio = () => getAllFromStore(STORE_AUDIO);
    const putAudio = (audio) => putItemInStore(STORE_AUDIO, audio);
    const removeAudio = (id) => removeItemFromStore(STORE_AUDIO, id);

    // ---------- UTILS ----------
    const PATH_TO_IMAGES = 'images/';
    const PATH_TO_THUMBS = 'thumbnails/';

    async function hashString(str) {
      const encoder = new TextEncoder();
      const data = encoder.encode(str);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function generateVideoThumbnail(file, seekTo = 0.5) {
      return new Promise((resolve, reject) => {
        const video = document.createElement('video');
        video.preload = 'metadata';
        video.onloadeddata = () => { video.currentTime = Math.min(seekTo, video.duration / 2); };
        video.onseeked = () => {
          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(blob => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
          }, 'image/jpeg', 0.8);
          video.remove();
        };
        video.onerror = reject;
        video.src = URL.createObjectURL(file);
      });
    }

    const formatTime = (sec) => isNaN(sec) ? '0:00' : `${Math.floor(sec / 60)}:${Math.floor(sec % 60).toString().padStart(2, '0')}`;

    // ---------- GLOBAL CONTEXT ----------
    const AppContext = createContext();

    // ---------- MAIN APP ----------
    function App() {
      // persistent state
      const [rawFileList, setRawFileList] = useState([]);
      const [thumbnailMap, setThumbnailMap] = useState({});
      const [uploadedMedia, setUploadedMedia] = useState([]);
      const [uploadedThumbnails, setUploadedThumbnails] = useState({});
      const [favorites, setFavorites] = useState(() => new Set(JSON.parse(localStorage.getItem('sg_favorites') || '[]')));
      const [deletedMedia, setDeletedMedia] = useState(() => JSON.parse(localStorage.getItem('sg_deleted') || '[]'));
      const [hiddenAlbums, setHiddenAlbums] = useState(() => JSON.parse(localStorage.getItem('sg_hidden') || '{}'));
      const [viewSettings, setViewSettings] = useState(() => JSON.parse(localStorage.getItem('sg_view') || '{"type":"masonry","size":"medium","showInfo":false}'));
      const [albumSortOrder, setAlbumSortOrder] = useState('asc');

      // audio state
      const [uploadedAudio, setUploadedAudio] = useState([]);
      const audioRef = useRef(null);
      const [currentAudioId, setCurrentAudioId] = useState(null);
      const [audioPlaying, setAudioPlaying] = useState(false);
      const [audioProgress, setAudioProgress] = useState(0);
      const [audioDuration, setAudioDuration] = useState(0);
      const [audioVolume, setAudioVolume] = useState(1);
      const [audioLoop, setAudioLoop] = useState(false);

      // master password
      const [masterPasswordHash, setMasterPasswordHash] = useState(() => localStorage.getItem('sg_master_hash'));
      const [hiddenPortalAuth, setHiddenPortalAuth] = useState(false);

      // people data
      const [peopleData, setPeopleData] = useState({});

      // UI state
      const [activeView, setActiveView] = useState('people');
      const [activeAlbum, setActiveAlbum] = useState(null);
      const [galleryContext, setGalleryContext] = useState(null);
      const [currentGallery, setCurrentGallery] = useState([]);
      const [currentPhotoIndex, setCurrentPhotoIndex] = useState(0);
      const [lightboxOpen, setLightboxOpen] = useState(false);
      const [slideshowInterval, setSlideshowInterval] = useState(null);
      const [greeting] = useState('');

      // zoom
      const [zoomScale, setZoomScale] = useState(1);
      const [zoomTranslate, setZoomTranslate] = useState({ x: 0, y: 0 });

      // modals
      const [uploadModalOpen, setUploadModalOpen] = useState(false);
      const [hideModalOpen, setHideModalOpen] = useState(false);
      const [albumToHide, setAlbumToHide] = useState(null);
      const [backupCodesModalOpen, setBackupCodesModalOpen] = useState(false);
      const [currentBackupCodes, setCurrentBackupCodes] = useState([]);
      const [unlockModalOpen, setUnlockModalOpen] = useState(false);
      const [albumToUnlock, setAlbumToUnlock] = useState(null);
      const [unlockPortalModalOpen, setUnlockPortalModalOpen] = useState(false);
      const [changeMasterPwModalOpen, setChangeMasterPwModalOpen] = useState(false);
      const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });

      // unlocked hidden
      const [unlockedHidden, setUnlockedHidden] = useState(new Set());

      // gallery search & filters
      const [gallerySearch, setGallerySearch] = useState('');
      const [filterType, setFilterType] = useState('all'); // 'all', 'image', 'video'

      // bulk selection
      const [selectionMode, setSelectionMode] = useState(false);
      const [selectedItems, setSelectedItems] = useState(new Set());

      // ---------- EFFECTS ----------
      useEffect(() => {
        async function loadData() {
          try {
            const [fileRes, thumbRes] = await Promise.all([
              fetch('data.json').catch(() => ({ json: () => [] })),
              fetch('thumbnails.json').catch(() => ({ json: () => ({}) }))
            ]);
            const fileList = await fileRes.json();
            const thumbMap = await thumbRes.json();
            setRawFileList([...new Set(fileList)]);
            setThumbnailMap(thumbMap);
          } catch { setRawFileList([]); setThumbnailMap({}); }
        }
        loadData();
      }, []);

      useEffect(() => {
        async function loadUploaded() {
          try {
            const media = await getAllFromStore(STORE_MEDIA);
            setUploadedMedia(media || []);
            const thumbs = await getAllFromStore(STORE_THUMBS);
            const thumbObj = {};
            thumbs.forEach(t => thumbObj[t.album] = t.dataURL);
            setUploadedThumbnails(thumbObj);
            const audio = await getAllAudio();
            setUploadedAudio(audio || []);
          } catch { setUploadedMedia([]); setUploadedThumbnails({}); setUploadedAudio([]); }
        }
        loadUploaded();
      }, []);

      useEffect(() => { uploadedMedia.forEach(m => putItemInStore(STORE_MEDIA, m).catch(()=>{})); }, [uploadedMedia]);
      useEffect(() => { Object.entries(uploadedThumbnails).forEach(([album, dataURL]) => putItemInStore(STORE_THUMBS, { album, dataURL }).catch(()=>{})); }, [uploadedThumbnails]);
      useEffect(() => { uploadedAudio.forEach(a => putAudio(a).catch(()=>{})); }, [uploadedAudio]);

      useEffect(() => { localStorage.setItem('sg_favorites', JSON.stringify([...favorites])); }, [favorites]);
      useEffect(() => { localStorage.setItem('sg_deleted', JSON.stringify(deletedMedia)); }, [deletedMedia]);
      useEffect(() => { localStorage.setItem('sg_hidden', JSON.stringify(hiddenAlbums)); }, [hiddenAlbums]);
      useEffect(() => { localStorage.setItem('sg_view', JSON.stringify(viewSettings)); }, [viewSettings]);
      useEffect(() => { masterPasswordHash ? localStorage.setItem('sg_master_hash', masterPasswordHash) : localStorage.removeItem('sg_master_hash'); }, [masterPasswordHash]);

      useEffect(() => () => { if (audioRef.current) { audioRef.current.pause(); URL.revokeObjectURL(audioRef.current.src); } }, []);

      const effectiveThumbnailMap = useMemo(() => ({ ...thumbnailMap, ...uploadedThumbnails }), [thumbnailMap, uploadedThumbnails]);

      useEffect(() => {
        const allFiles = [...rawFileList];
        const activeMedia = uploadedMedia.filter(m => !deletedMedia.some(d => d.filename === m.filename));
        activeMedia.forEach(m => { if (!allFiles.includes(m.filename)) allFiles.push(m.filename); });
        const pd = {};
        allFiles.forEach(filename => {
          const cleanFile = filename.trim();
          if (!cleanFile) return;
          let namePart = cleanFile.includes('-') ? cleanFile.split('-')[0] : cleanFile.split('_')[0] || '';
          if (!namePart) return;
          let people = namePart.split('+');
          people.forEach(rawName => {
            let cleanName = rawName.trim();
            if (cleanName.length) {
              cleanName = cleanName.charAt(0).toUpperCase() + cleanName.slice(1);
              if (cleanName.toLowerCase() === 'idk') cleanName = 'IDK';
            }
            if (['Img', 'Picsart'].includes(cleanName)) return;
            if (!pd[cleanName]) pd[cleanName] = { count: 0, photos: [] };
            pd[cleanName].count++;
            pd[cleanName].photos.push(filename);
          });
        });
        setPeopleData(pd);
      }, [rawFileList, uploadedMedia, deletedMedia]);

      // ---------- HELPERS ----------
      const showToast = (msg, type = 'success') => {
        setToast({ show: true, msg, type });
        setTimeout(() => setToast({ show: false, msg: '', type: 'success' }), 3000);
      };

      const getThumbUrl = (name) => {
        if (uploadedThumbnails[name]) return uploadedThumbnails[name];
        let thumbSrc = `${PATH_TO_THUMBS}${name}.jpg`;
        if (thumbnailMap[name]) thumbSrc = `${PATH_TO_THUMBS}${thumbnailMap[name]}`;
        return thumbSrc;
      };

      const getAllVisiblePhotos = useCallback(() => {
        const all = [...rawFileList];
        uploadedMedia.forEach(m => {
          if (!deletedMedia.some(d => d.filename === m.filename) && !all.includes(m.filename)) {
            all.push(m.filename);
          }
        });
        return all;
      }, [rawFileList, uploadedMedia, deletedMedia]);

      const isAlbumHidden = (name) => !!hiddenAlbums[name];
      const getAlbumPhotoCount = (albumName) => {
        let count = 0;
        rawFileList.forEach(f => { if (f.startsWith(albumName + '-') || f.startsWith(albumName + '_')) count++; });
        uploadedMedia.forEach(m => { if (m.album === albumName && !deletedMedia.some(d => d.filename === m.filename)) count++; });
        return count;
      };

      // favorites
      const toggleFavorite = (filename) => {
        setFavorites(prev => { const s = new Set(prev); s.has(filename) ? s.delete(filename) : s.add(filename); return s; });
      };
      const openFavoriteLightbox = (filename) => {
        const favs = getAllVisiblePhotos().filter(f => favorites.has(f));
        const index = favs.indexOf(filename);
        if (index === -1) return;
        setActiveAlbum('Favorites');
        setGalleryContext('favorites');
        setCurrentGallery(favs);
        setActiveView('gallery');
        setTimeout(() => { setCurrentPhotoIndex(index); setLightboxOpen(true); }, 10);
      };

      // trash
      const deleteUploadedMedia = (filename) => {
        const media = uploadedMedia.find(i => i.filename === filename);
        if (!media) return;
        setUploadedMedia(prev => prev.filter(i => i.filename !== filename));
        setDeletedMedia(prev => [...prev, { ...media, deletedAt: new Date().toISOString() }]);
        setFavorites(prev => { const s = new Set(prev); s.delete(filename); return s; });
        showToast('Moved to trash');
        if (currentGallery.includes(filename)) setCurrentGallery(prev => prev.filter(f => f !== filename));
        if (lightboxOpen && currentGallery[currentPhotoIndex] === filename) closeLightbox();
      };
      const restoreUploadedMedia = (filename) => {
        const media = deletedMedia.find(i => i.filename === filename);
        if (!media) return;
        setDeletedMedia(prev => prev.filter(i => i.filename !== filename));
        setUploadedMedia(prev => [...prev, media]);
        showToast('Restored');
      };
      const permanentlyDeleteMedia = (filename) => {
        setDeletedMedia(prev => prev.filter(i => i.filename !== filename));
        removeItemFromStore(STORE_MEDIA, filename).catch(()=>{});
        showToast('Permanently deleted');
      };
      const clearTrash = () => {
        if (confirm('Empty trash?')) {
          deletedMedia.forEach(m => removeItemFromStore(STORE_MEDIA, m.filename).catch(()=>{}));
          setDeletedMedia([]);
          showToast('Trash emptied');
          if (activeAlbum === 'Trash') setCurrentGallery([]);
        }
      };

      // hidden albums
      const generateBackupCodes = () => {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        return Array.from({ length: 5 }, () => Array.from({ length: 8 }, () => chars[Math.floor(Math.random() * chars.length)]).join(''));
      };
      const hideAlbum = async (albumName, password, question, answer) => {
        if (isAlbumHidden(albumName)) return false;
        const hashedPassword = await hashString(password);
        const hashedAnswer = await hashString(answer.toLowerCase());
        const codes = generateBackupCodes();
        setHiddenAlbums(prev => ({ ...prev, [albumName]: { password: hashedPassword, question, answer: hashedAnswer, backupCodes: codes, hiddenAt: new Date().toISOString() } }));
        return codes;
      };
      const unhideAlbum = (albumName) => {
        setHiddenAlbums(prev => { const { [albumName]: _, ...rest } = prev; return rest; });
        setUnlockedHidden(prev => { const s = new Set(prev); s.delete(albumName); return s; });
        showToast(`"${albumName}" is now visible`);
      };
      const useBackupCode = (albumName, code) => {
        const album = hiddenAlbums[albumName];
        if (!album) return false;
        const idx = album.backupCodes.indexOf(code);
        if (idx !== -1) {
          album.backupCodes.splice(idx, 1);
          setHiddenAlbums(prev => ({ ...prev, [albumName]: { ...album, backupCodes: [...album.backupCodes] } }));
          return true;
        }
        return false;
      };
      const regenerateBackupCodes = (albumName) => {
        const album = hiddenAlbums[albumName];
        if (!album) return null;
        const newCodes = generateBackupCodes();
        album.backupCodes = newCodes;
        setHiddenAlbums(prev => ({ ...prev, [albumName]: { ...album } }));
        return newCodes;
      };
      const promptUnlockAlbum = (albumName) => { setAlbumToUnlock(albumName); setUnlockModalOpen(true); };

      // master password
      const setMasterPassword = async (password) => { const hash = await hashString(password); setMasterPasswordHash(hash); setHiddenPortalAuth(true); setActiveView('hiddenPortal'); };
      const verifyMasterPassword = async (password) => masterPasswordHash && (await hashString(password)) === masterPasswordHash;
      const changeMasterPassword = async (oldPassword, newPassword) => (await verifyMasterPassword(oldPassword)) ? (await setMasterPassword(newPassword), true) : false;

      // uploads
      const handleMediaUpload = async (album, files) => {
        for (const file of files) {
          const isVideo = file.type.startsWith('video/');
          const dataURL = await readFileAsDataURL(file);
          const timestamp = Date.now();
          const random = Math.floor(Math.random() * 1000);
          const ext = file.name.split('.').pop() || (isVideo ? 'mp4' : 'jpg');
          const filename = `${album}-${timestamp}-${random}.${ext}`;
          const newMedia = { filename, dataURL, album, date: new Date().toISOString(), type: isVideo ? 'video' : 'image' };
          setUploadedMedia(prev => [...prev, newMedia]);

          if (isVideo) {
            try {
              const thumbDataURL = await generateVideoThumbnail(file);
              setUploadedThumbnails(prev => ({ ...prev, [album]: thumbDataURL }));
            } catch (e) { console.warn('Video thumbnail failed', e); }
          }
        }
        showToast(`${files.length} item(s) added to "${album}"`);
      };

      const handleThumbnailUpload = async (album, file) => {
        const dataURL = await readFileAsDataURL(file);
        setUploadedThumbnails(prev => ({ ...prev, [album]: dataURL }));
        showToast(`Thumbnail for "${album}" updated`);
      };

      const handleAudioUpload = async (files) => {
        for (const file of files) {
          const arrayBuffer = await file.arrayBuffer();
          const blob = new Blob([arrayBuffer], { type: file.type });
          const id = `audio-${Date.now()}-${Math.random().toString(36).substring(2)}`;
          setUploadedAudio(prev => [...prev, { id, blob, name: file.name, date: new Date().toISOString(), size: file.size, type: file.type }]);
        }
        showToast(`${files.length} audio(s) uploaded`);
      };
      const deleteAudio = (id) => {
        if (currentAudioId === id) { audioRef.current?.pause(); URL.revokeObjectURL(audioRef.current?.src); audioRef.current = null; setCurrentAudioId(null); setAudioPlaying(false); }
        setUploadedAudio(prev => prev.filter(a => a.id !== id));
        removeAudio(id).catch(()=>{});
        showToast('Audio deleted');
      };
      const playAudio = (audio) => {
        if (audioRef.current) { audioRef.current.pause(); URL.revokeObjectURL(audioRef.current.src); }
        const url = URL.createObjectURL(audio.blob);
        const audioEl = new Audio(url);
        audioEl.loop = audioLoop;
        audioRef.current = audioEl;
        audioEl.volume = audioVolume;
        audioEl.addEventListener('timeupdate', () => setAudioProgress(audioEl.currentTime));
        audioEl.addEventListener('loadedmetadata', () => setAudioDuration(audioEl.duration));
        audioEl.addEventListener('ended', () => { setAudioPlaying(false); setAudioProgress(0); });
        audioEl.play();
        setCurrentAudioId(audio.id);
        setAudioPlaying(true);
      };
      const pauseAudio = () => { audioRef.current?.pause(); setAudioPlaying(false); };
      const resumeAudio = () => { if (audioRef.current && currentAudioId) { audioRef.current.play(); setAudioPlaying(true); } };
      const stopAudio = () => { if (audioRef.current) { audioRef.current.pause(); audioRef.current.currentTime = 0; setAudioPlaying(false); setAudioProgress(0); } };
      const seekAudio = (time) => { if (audioRef.current) { audioRef.current.currentTime = time; setAudioProgress(time); } };
      const setVolume = (vol) => { setAudioVolume(vol); if (audioRef.current) audioRef.current.volume = vol; };
      const toggleLoop = () => { setAudioLoop(prev => !prev); if (audioRef.current) audioRef.current.loop = !audioLoop; };
      const currentAudioFile = useMemo(() => uploadedAudio.find(a => a.id === currentAudioId), [uploadedAudio, currentAudioId]);

      // gallery navigation
      const openGallery = (albumName, photos, context) => {
        setActiveAlbum(albumName);

        setCurrentGallery(photos);

        setZoomScale(1);

      };
      const showAlbum = (name) => {
        if (name === 'Trash') openGallery('Trash', deletedMedia.map(i => i.filename), 'trash');
        else if (name === 'Recent Uploads') {
          const sevenDaysAgo = Date.now() - 7*24*60*60*1000;
          const recent = uploadedMedia.filter(m => new Date(m.date).getTime() > sevenDaysAgo);
          openGallery('Recent Uploads', recent.map(m => m.filename), 'recent');
        } else if (name === 'Favorites') openGallery('Favorites', getAllVisiblePhotos().filter(f => favorites.has(f)), 'favorites');
        else if (name === 'All Photos') openGallery('All Photos', getAllVisiblePhotos(), 'all');
        else {
          const data = peopleData[name];
          if (data) openGallery(name, data.photos, 'album');
        }
      };
      const handleAlbumClick = (name) => { isAlbumHidden(name) ? promptUnlockAlbum(name) : showAlbum(name); };

      // lightbox
      const openLightbox = (index) => { setCurrentPhotoIndex(index); setLightboxOpen(true); setZoomScale(1); setZoomTranslate({ x: 0, y: 0 }); };
      const closeLightbox = () => { setLightboxOpen(false); if (slideshowInterval) { clearInterval(slideshowInterval); setSlideshowInterval(null); } };
      const nextImage = () => { setCurrentPhotoIndex(prev => (prev + 1) % currentGallery.length); setZoomScale(1); setZoomTranslate({ x: 0, y: 0 }); };
      const prevImage = () => { setCurrentPhotoIndex(prev => (prev - 1 + currentGallery.length) % currentGallery.length); setZoomScale(1); setZoomTranslate({ x: 0, y: 0 }); };
      const toggleSlideshow = () => {
        if (slideshowInterval) { clearInterval(slideshowInterval); setSlideshowInterval(null); }
        else { nextImage(); const int = setInterval(() => { setCurrentPhotoIndex(prev => (prev + 1) % currentGallery.length); setZoomScale(1); setZoomTranslate({ x: 0, y: 0 }); }, 3000); setSlideshowInterval(int); }
      };

      // delete current image from lightbox
      const deleteCurrentImage = () => {
        if (currentGallery.length && currentPhotoIndex >= 0) {
          const filename = currentGallery[currentPhotoIndex];
          if (uploadedMedia.some(i => i.filename === filename) && activeAlbum !== 'Trash') {

      };

      // zoom
      const handleZoomIn = (mouseX, mouseY) => {
        setZoomScale(prev => {
          const newScale = Math.min(prev + 0.5, 3);
          if (mouseX !== undefined && mouseY !== undefined && containerRef.current) {
            const rect = containerRef.current.getBoundingClientRect();
            const x = mouseX - rect.left;
            const y = mouseY - rect.top;
            const dx = (x - rect.width/2) * (newScale/prev - 1);
            const dy = (y - rect.height/2) * (newScale/prev - 1);
            setZoomTranslate(prevTrans => ({ x: prevTrans.x - dx, y: prevTrans.y - dy }));
          }
          return newScale;
        });
      };
      const handleZoomOut = () => setZoomScale(prev => Math.max(prev - 0.5, 1));
      const handleZoomReset = () => { setZoomScale(1); setZoomTranslate({ x: 0, y: 0 }); };

      const containerRef = useRef(null);

        activeView, activeAlbum, galleryContext, currentGallery, currentPhotoIndex,
        lightboxOpen, slideshowInterval, unlockedHidden, albumSuggestions, gallerySearch, setGallerySearch,
        filterType, setFilterType,
        selectionMode, setSelectionMode, selectedItems, toggleSelection, clearSelection, deleteSelected, favoriteSelected,
        uploadedAudio, currentAudioId, currentAudioFile, audioPlaying, audioProgress, audioDuration, audioVolume, audioLoop,
        playAudio, pauseAudio, resumeAudio, stopAudio, seekAudio, setVolume, toggleLoop, deleteAudio, formatTime,
        setUnlockedHidden, getAllVisiblePhotos, getThumbUrl, isAlbumHidden, getAlbumPhotoCount,

          <UnlockAlbumModal isOpen={unlockModalOpen} onClose={() => setUnlockModalOpen(false)} albumName={albumToUnlock} />
          <UnlockHiddenPortalModal isOpen={unlockPortalModalOpen} onClose={() => setUnlockPortalModalOpen(false)} />
          <ChangeMasterPasswordModal isOpen={changeMasterPwModalOpen} onClose={() => setChangeMasterPwModalOpen(false)} />
          <Lightbox />
          <Toast {...toast} />
        </AppContext.Provider>
      );

                  <div className={`w-10 h-10 rounded-full overflow-hidden shadow-md ring-2 ring-amber-200 dark:ring-amber-800 flex items-center justify-center ${isTrash ? 'bg-stone-200 dark:bg-stone-700' : activeAlbum === 'Favorites' ? 'bg-rose-100 dark:bg-rose-900/30' : activeAlbum === 'All Photos' ? 'bg-amber-100 dark:bg-amber-900/30' : activeAlbum === 'Recent Uploads' ? 'bg-emerald-100 dark:bg-emerald-900/30' : 'bg-stone-100 dark:bg-stone-800'}`}>
                    {avatarSrc ? <img src={avatarSrc} alt="" className="w-full h-full object-cover" /> : <i className={`fa-solid ${isTrash ? 'fa-trash text-stone-600' : activeAlbum === 'Favorites' ? 'fa-heart text-rose-600' : activeAlbum === 'All Photos' ? 'fa-layer-group text-amber-600' : activeAlbum === 'Recent Uploads' ? 'fa-clock text-emerald-600' : ''} text-lg`}></i>}
                  </div>
                  <div className="leading-tight">
                    <h2 className="text-lg font-bold text-stone-900 dark:text-amber-100">{activeAlbum}</h2>
                    <p className="text-xs text-stone-500 dark:text-amber-300/70 font-medium">{isTrash ? trashItems.length : filteredGallery.length} items</p>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-2 ml-auto flex-wrap">
                {/* Filter by type */}
                <select value={filterType} onChange={(e) => setFilterType(e.target.value)} className="bg-white/70 dark:bg-stone-800/70 border border-amber-200 dark:border-amber-800/30 rounded-full py-2 px-3 text-xs font-medium text-stone-700 dark:text-amber-200 focus:ring-2 focus:ring-amber-500/20 outline-none">
                  <option value="all">All</option>
                  <option value="image">Images</option>
                  <option value="video">Videos</option>
                </select>
                <div className="relative">
                  <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-xs"></i>
                  <input type="text" placeholder="Filter..." value={gallerySearch} onChange={(e) => setGallerySearch(e.target.value)} className="bg-white/70 dark:bg-stone-800/70 border border-amber-200 dark:border-amber-800/30 rounded-full py-2 pl-9 pr-4 text-xs w-32 sm:w-40 focus:ring-2 focus:ring-amber-500/20 outline-none" />
                </div>
                <div className="relative">
                  <button onClick={() => setDropdownOpen(!dropdownOpen)} className="w-10 h-10 rounded-full bg-stone-100 dark:bg-stone-800 hover:bg-amber-50 dark:hover:bg-stone-700 text-stone-700 dark:text-amber-300 transition shadow-sm">
                    <i className="fa-solid fa-sliders"></i>
                  </button>
                  {dropdownOpen && (
                    <div className="absolute right-0 top-12 w-56 bg-white dark:bg-stone-900 border border-amber-200 dark:border-amber-800/30 rounded-xl shadow-2xl z-40 p-3 animate-enter">
                      <div className="space-y-4">
                        <div>
                          <p className="text-[10px] uppercase font-bold text-stone-400 mb-2">Grid Layout</p>
                          <div className="flex bg-stone-100 dark:bg-stone-800 p-1 rounded-lg">
                            {['masonry', 'square'].map(type => (
                              <button key={type} onClick={() => updateViewSetting('type', type)} className={`flex-1 py-1.5 rounded-md text-xs font-medium transition-colors ${viewSettings.type === type ? 'bg-white text-amber-700 shadow-sm dark:bg-stone-700 dark:text-amber-400' : 'text-stone-500'}`}>
                                {type === 'masonry' ? 'Masonry' : 'Square'}
                              </button>
                            ))}
                          </div>
                        </div>
                        <div>
                          <p className="text-[10px] uppercase font-bold text-stone-400 mb-2">Thumbnail Size</p>
                          <div className="flex justify-between items-center bg-stone-100 dark:bg-stone-800 p-1 rounded-lg px-2">
                            {['small', 'medium', 'large'].map((size, i) => (
                              <button key={size} onClick={() => updateViewSetting('size', size)} className={`w-8 h-8 rounded hover:bg-white dark:hover:bg-stone-700 transition flex items-center justify-center ${viewSettings.size === size ? 'bg-white text-amber-700 shadow-sm dark:bg-stone-700 dark:text-amber-400' : 'text-stone-500'}`}>
                                <i className={`fa-solid fa-border-all ${i === 0 ? 'text-xs' : i === 1 ? 'text-sm' : 'text-lg'}`}></i>
                              </button>
                            ))}
                          </div>
                        </div>
                        <div>
                          <div className="flex items-center justify-between cursor-pointer" onClick={() => updateViewSetting('showInfo', !viewSettings.showInfo)}>
                            <span className="text-xs font-medium text-stone-700 dark:text-stone-300">Show File Info</span>
                            <div className={`w-8 h-4 rounded-full relative transition-colors ${viewSettings.showInfo ? 'bg-amber-600' : 'bg-stone-200 dark:bg-stone-700'}`}>
                              <div className={`w-4 h-4 bg-white rounded-full shadow absolute left-0 transition-all transform ${viewSettings.showInfo ? 'translate-x-4' : 'translate-x-0'}`}></div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* Selection toolbar */}
          {selectionMode && selectedItems.size > 0 && (
            <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 bulk-toolbar rounded-full px-4 py-2 shadow-2xl flex items-center gap-3">
              <span className="text-amber-200 text-sm font-medium">{selectedItems.size} selected</span>
              <button onClick={favoriteSelected} className="px-3 py-1.5 bg-amber-600 hover:bg-amber-700 text-white rounded-full text-xs font-bold transition flex items-center gap-1">
                <i className="fa-solid fa-heart"></i> Favorite
              </button>
              <button onClick={deleteSelected} className="px-3 py-1.5 bg-rose-700 hover:bg-rose-800 text-white rounded-full text-xs font-bold transition flex items-center gap-1">
                <i className="fa-solid fa-trash"></i> Delete
              </button>
              <button onClick={() => {}} className="px-3 py-1.5 bg-stone-600 hover:bg-stone-700 text-white rounded-full text-xs font-bold transition flex items-center gap-1">
                <i className="fa-solid fa-folder-open"></i> Move
              </button>
            </div>
          )}

          <div id="photo-container">
            {filteredGallery.length === 0 ? (
              <div className="text-center py-32">
                <div className="w-20 h-20 bg-stone-100 dark:bg-stone-800/50 rounded-full flex items-center justify-center mx-auto mb-4 text-stone-400 dark:text-stone-600">
                  <i className="fa-regular fa-image text-3xl"></i>
                </div>
                <p className="text-stone-500 dark:text-stone-400 font-medium">No items match.</p>
              </div>
            ) : (
              <>
                <div className={viewSettings.type === 'square' 
                  ? `grid ${viewSettings.size === 'small' ? 'grid-cols-3 sm:grid-cols-5 lg:grid-cols-7 gap-1' : viewSettings.size === 'large' ? 'grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4' : 'grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 gap-1'}`
                  : `columns-2 sm:columns-3 lg:columns-4 ${viewSettings.size === 'small' ? 'gap-4' : viewSettings.size === 'large' ? 'gap-6' : 'gap-4'}`}>
                  {filteredGallery.map((item, idx) => {
                    let filename, src, isVideo, inTrash = isTrash;
                    if (isTrash) {
                      filename = item.filename;
                      src = item.dataURL;
                      isVideo = item.type === 'video' || filename.toLowerCase().endsWith('.mp4');
                    } else {
                      filename = item;
                      src = getItemSrc(filename);
                      const media = uploadedMedia.find(m => m.filename === filename);
                      isVideo = media?.type === 'video' || filename.toLowerCase().endsWith('.mp4');
                    }
                    const isSelected = selectedItems.has(filename);
                    const canSelect = selectionMode && !inTrash; // no selection in trash

                    return (
                      <div key={filename} className={`group relative overflow-hidden cursor-zoom-in bg-stone-200 dark:bg-stone-800 shadow-sm hover:shadow-md transition-all mb-4 ${viewSettings.type === 'square' ? 'aspect-square' : 'masonry-item break-inside-avoid rounded-xl'} ${canSelect && isSelected ? 'selected-item' : ''} ${canSelect ? 'selectable' : ''}`}
                        onClick={(e) => {
                          if (selectionMode) {
                            e.stopPropagation();
                            toggleSelection(filename);
                          } else {
                            openLightbox(idx);
                          }
                        }}>
                        {isVideo ? <video src={src} className="w-full h-full object-cover pointer-events-none" /> : <img src={src} loading="lazy" className="w-full h-full object-cover transition duration-700 group-hover:scale-110 img-loading" onLoad={(e) => e.target.classList.add('img-loaded')} />}
                        
                        {isVideo && <div className="absolute inset-0 flex items-center justify-center text-white/80"><i className="fa-solid fa-play text-4xl drop-shadow-xl"></i></div>}

                        {/* Selection indicator */}
                        {canSelect && isSelected && (
                          <div className="absolute top-2 left-2 w-6 h-6 bg-amber-500 rounded-full flex items-center justify-center text-white text-xs border-2 border-white z-20">
                            <i className="fa-solid fa-check"></i>
                          </div>
                        )}

                        <div className="absolute top-2 right-2 flex gap-1 z-20">
                          {inTrash ? (
                            <>
                              <button onClick={(e) => { e.stopPropagation(); restoreUploadedMedia(filename); }} className="w-7 h-7 rounded-full bg-emerald-600 hover:bg-emerald-700 text-white flex items-center justify-center shadow-lg photo-action-btn">
                                <i className="fa-solid fa-rotate-left text-xs"></i>
                              </button>
                              <button onClick={(e) => { e.stopPropagation(); permanentlyDeleteMedia(filename); }} className="w-7 h-7 rounded-full bg-red-600 hover:bg-red-700 text-white flex items-center justify-center shadow-lg photo-action-btn">
                                <i className="fa-solid fa-trash text-xs"></i>
                              </button>
                            </>
                          ) : (
                            uploadedMedia.some(m => m.filename === filename) && !inTrash && (
                              <button onClick={(e) => { e.stopPropagation(); deleteUploadedMedia(filename); }} className="w-7 h-7 rounded-full bg-red-500 hover:bg-red-600 text-white flex items-center justify-center shadow-lg photo-action-btn">
                                <i className="fa-solid fa-trash text-xs"></i>
                              </button>
                            )
                          )}
                        </div>

                        {viewSettings.showInfo && !inTrash && (
                          <div className="absolute bottom-0 left-0 w-full p-2 bg-gradient-to-t from-black/80 to-transparent pointer-events-none">
                            <p className="text-white text-[10px] font-mono truncate opacity-90">{filename}</p>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                {isTrash && deletedMedia.length > 0 && (
                  <div className="flex justify-center mt-8">
                    <button onClick={clearTrash} className="px-6 py-3 bg-rose-700 hover:bg-rose-800 text-white rounded-full text-sm font-bold shadow-lg transition flex items-center gap-2">
                      <i className="fa-solid fa-trash"></i> Empty Trash
                    </button>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    };

    // HiddenPortalView (same as before, but with royal touch)
    const HiddenPortalView = () => {
      const { hiddenAlbums, unlockedHidden, showAlbum, getThumbUrl, getAlbumPhotoCount, unhideAlbum, regenerateBackupCodes, setBackupCodesModalOpen, setCurrentBackupCodes, setActiveView, promptUnlockAlbum, setHiddenPortalAuth, setChangeMasterPwModalOpen } = useContext(AppContext);
      const hiddenNames = Object.keys(hiddenAlbums);
      const handleLogout = () => { setHiddenPortalAuth(false); setActiveView('people'); };
      return (
        <div className="animate-enter pb-12">
          <div className="sticky top-20 z-30 -mx-4 px-4 sm:mx-0 sm:px-0 mb-8">
            <div className="bg-white/80 dark:bg-stone-900/80 backdrop-blur-xl border border-amber-200/50 dark:border-amber-900/30 shadow-xl rounded-2xl p-3 sm:p-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <button onClick={() => setActiveView('people')} className="w-10 h-10 flex items-center justify-center rounded-full bg-stone-100 dark:bg-stone-800 hover:bg-stone-900 hover:text-amber-200 dark:hover:bg-white dark:hover:text-stone-900 transition-all shadow-sm">
                  <i className="fa-solid fa-arrow-left text-sm"></i>
                </button>
                <h2 className="text-xl font-bold text-stone-900 dark:text-amber-100 flex items-center gap-2">
                  <i className="fa-solid fa-crown text-amber-500"></i> Hidden Vault
                </h2>
              </div>
              <div className="flex gap-2">
                <button onClick={() => setChangeMasterPwModalOpen(true)} className="px-4 py-2 bg-amber-700 hover:bg-amber-800 text-white text-xs rounded-full transition shadow-md">
                  <i className="fa-solid fa-key mr-1"></i> Change Key
                </button>
                <button onClick={handleLogout} className="px-4 py-2 bg-purple-800 hover:bg-purple-900 text-white text-xs rounded-full transition shadow-md">
                  <i className="fa-solid fa-sign-out-alt mr-1"></i> Lock Vault
                </button>
              </div>
            </div>
          </div>
          {hiddenNames.length === 0 ? (
            <div className="text-center py-20"><div className="w-20 h-20 bg-stone-100 dark:bg-stone-800 rounded-full flex items-center justify-center mx-auto mb-4 text-stone-400"><i className="fa-solid fa-lock text-3xl"></i></div><p className="text-stone-500 dark:text-stone-400 font-medium">No hidden albums.</p></div>
          ) : (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
              {hiddenNames.map(name => {
                const count = getAlbumPhotoCount(name);
                const isUnlocked = unlockedHidden.has(name);
                return (
                  <div key={name} className="group bg-white dark:bg-stone-800/90 rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 overflow-hidden border border-amber-200/70 dark:border-amber-700/70">
                    <div className="relative aspect-[4/3] bg-stone-200 dark:bg-stone-700 cursor-pointer" onClick={() => isUnlocked ? showAlbum(name) : promptUnlockAlbum(name)}>
                      <img src={getThumbUrl(name)} alt={name} className="absolute inset-0 w-full h-full object-cover img-loading" onLoad={(e) => e.target.classList.add('img-loaded')} onError={(e) => e.target.src = `https://ui-avatars.com/api/?name=${name}&background=6b21a8&color=ffd700`} />
                      <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
                      <div className="absolute bottom-2 left-3 right-3 flex justify-between items-end">
                        <h3 className="text-amber-200 font-bold text-lg truncate">{name}</h3>
                        <span className="bg-black/40 backdrop-blur-sm text-amber-300 text-xs px-2 py-1 rounded-full border border-amber-400/30">{count} items</span>
                      </div>
                      {!isUnlocked && <div className="absolute top-2 left-2 bg-black/60 backdrop-blur-sm text-amber-300 text-[10px] px-2 py-1 rounded-full border border-amber-400/30"><i className="fa-solid fa-lock mr-1"></i> Locked</div>}
                    </div>
                    <div className="p-3 flex flex-wrap gap-2">
                      <button onClick={() => isUnlocked ? showAlbum(name) : promptUnlockAlbum(name)} 
                        className={`flex-1 py-1.5 text-xs rounded-full font-medium transition flex items-center justify-center gap-1 ${isUnlocked ? 'bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300' : 'bg-purple-100 text-purple-800 dark:bg-purple-900/40 dark:text-purple-300'}`}>
                        <i className={`fa-solid ${isUnlocked ? 'fa-eye' : 'fa-unlock-alt'}`}></i>
                        {isUnlocked ? 'View' : 'Unlock'}
                      </button>
                      <button onClick={() => unhideAlbum(name)} 
                        className="flex-1 py-1.5 text-xs rounded-full bg-amber-100 text-amber-800 hover:bg-amber-200 dark:bg-amber-900/40 dark:text-amber-300 transition font-medium flex items-center justify-center gap-1">
                        <i className="fa-solid fa-lock-open"></i> Unhide
                      </button>
                      <button onClick={() => { const newCodes = regenerateBackupCodes(name); setCurrentBackupCodes(newCodes); setBackupCodesModalOpen(true); }} 
                        className="w-8 h-6 rounded-full bg-stone-100 dark:bg-stone-700 text-stone-600 dark:text-stone-300 hover:bg-stone-200 transition flex items-center justify-center text-xs">
                        <i className="fa-solid fa-arrows-rotate"></i>
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // AudioView (same as before, just royal)
    const AudioView = () => {
      const { uploadedAudio, playAudio, currentAudioId, audioPlaying, pauseAudio, resumeAudio, deleteAudio, setActiveView, formatTime } = useContext(AppContext);
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);
      return (
        <div className="animate-enter pb-12">
          <div className="sticky top-20 z-30 -mx-4 px-4 sm:mx-0 sm:px-0 mb-8">
            <div className="bg-white/80 dark:bg-stone-900/80 backdrop-blur-xl border border-amber-200/50 dark:border-amber-900/30 shadow-xl rounded-2xl p-3 sm:p-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <button onClick={() => setActiveView('people')} className="w-10 h-10 flex items-center justify-center rounded-full bg-stone-100 dark:bg-stone-800 hover:bg-stone-900 hover:text-amber-200 dark:hover:bg-white dark:hover:text-stone-900 transition-all shadow-sm">
                  <i className="fa-solid fa-arrow-left text-sm"></i>
                </button>
                <h2 className="text-xl font-bold text-stone-900 dark:text-amber-100 flex items-center gap-2">
                  <i className="fa-solid fa-headphones text-emerald-600"></i> Audio Library
                </h2>
              </div>
              <div className="text-xs text-stone-500 dark:text-amber-300/70 bg-white/50 dark:bg-stone-800/50 px-3 py-1 rounded-full">
                {uploadedAudio.length} tracks
              </div>
            </div>
          </div>
          {uploadedAudio.length === 0 ? (
            <div className="text-center py-20"><div className="w-20 h-20 bg-stone-100 dark:bg-stone-800 rounded-full flex items-center justify-center mx-auto mb-4 text-stone-400"><i className="fa-solid fa-music text-3xl"></i></div><p className="text-stone-500 dark:text-stone-400 font-medium">No audio files yet.</p></div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {uploadedAudio.map(audio => (
                <div key={audio.id} className="bg-white/70 dark:bg-stone-800/70 backdrop-blur-sm rounded-xl p-4 shadow-md border border-amber-200 dark:border-amber-800/30 hover:shadow-lg transition-all">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-700 dark:text-emerald-400"><i className="fa-solid fa-music"></i></div>
                    <div className="flex-1 min-w-0">
                      <p className="font-medium truncate text-stone-900 dark:text-amber-100">{audio.name}</p>
                      <p className="text-xs text-stone-500 dark:text-amber-300/70">{new Date(audio.date).toLocaleDateString()} · {(audio.size / 1024 / 1024).toFixed(1)} MB</p>
                    </div>
                    <div className="flex gap-1">
                      <button onClick={() => { if (currentAudioId === audio.id && audioPlaying) pauseAudio(); else if (currentAudioId === audio.id && !audioPlaying) resumeAudio(); else playAudio(audio); }} className="w-10 h-10 rounded-full bg-amber-600 hover:bg-amber-700 text-white flex items-center justify-center transition shadow-md">
                        <i className={`fa-solid ${currentAudioId === audio.id && audioPlaying ? 'fa-pause' : 'fa-play'}`}></i>
                      </button>
                      <button onClick={() => setConfirmDeleteId(audio.id)} className="w-10 h-10 rounded-full bg-rose-600 hover:bg-rose-700 text-white flex items-center justify-center transition shadow-md">
                        <i className="fa-solid fa-trash"></i>
                      </button>
                    </div>
                  </div>
                  {confirmDeleteId === audio.id && (
                    <div className="mt-3 flex items-center gap-2 text-xs">
                      <span className="text-stone-600 dark:text-amber-300">Delete permanently?</span>
                      <button onClick={() => { deleteAudio(audio.id); setConfirmDeleteId(null); }} className="px-2 py-1 bg-rose-600 text-white rounded-md">Yes</button>
                      <button onClick={() => setConfirmDeleteId(null)} className="px-2 py-1 bg-stone-300 dark:bg-stone-600 rounded-md">No</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    // AudioPlayer (same as before, just royal)
    const AudioPlayer = () => {
      const { currentAudioFile, audioPlaying, audioProgress, audioDuration, pauseAudio, resumeAudio, stopAudio, seekAudio, setVolume, audioVolume, toggleLoop, audioLoop, formatTime } = useContext(AppContext);
      const [expanded, setExpanded] = useState(false);
      if (!currentAudioFile) return null;
      const progressPercent = audioDuration ? (audioProgress / audioDuration) * 100 : 0;
      return (
        <div className="audio-player fixed bottom-0 left-0 w-full z-40 p-2 sm:p-3 shadow-2xl border-t border-amber-200/50 dark:border-amber-900/30">
          <div className="container mx-auto">
            <div className="flex items-center gap-2 sm:gap-4 flex-wrap sm:flex-nowrap">
              <div className="flex items-center gap-2 min-w-0 flex-1">
                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-emerald-600 to-amber-700 flex items-center justify-center text-white shadow-lg flex-shrink-0"><i className="fa-solid fa-headphones"></i></div>
                <div className="truncate">
                  <p className="font-semibold text-sm truncate text-stone-900 dark:text-amber-100">{currentAudioFile.name}</p>
                  <p className="text-xs text-stone-500 dark:text-amber-300/70">{(currentAudioFile.size / 1024 / 1024).toFixed(1)} MB</p>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={stopAudio} className="w-8 h-8 rounded-full bg-stone-200 dark:bg-stone-700 hover:bg-stone-300 dark:hover:bg-stone-600 flex items-center justify-center transition text-stone-700 dark:text-amber-300"><i className="fa-solid fa-stop text-xs"></i></button>
                <button onClick={audioPlaying ? pauseAudio : resumeAudio} className="w-10 h-10 rounded-full bg-gradient-to-r from-amber-600 to-amber-700 hover:from-amber-700 hover:to-amber-800 text-white flex items-center justify-center shadow-md transition"><i className={`fa-solid ${audioPlaying ? 'fa-pause' : 'fa-play'}`}></i></button>
                <button onClick={toggleLoop} className={`w-8 h-8 rounded-full flex items-center justify-center transition ${audioLoop ? 'bg-amber-600 text-white' : 'bg-stone-200 dark:bg-stone-700 text-stone-700 dark:text-amber-300'}`}><i className="fa-solid fa-repeat text-xs"></i></button>
              </div>
              <div className="hidden sm:flex items-center gap-2 flex-1">
                <span className="text-xs font-mono text-stone-600 dark:text-amber-300">{formatTime(audioProgress)}</span>
                <input type="range" min="0" max={audioDuration || 0} value={audioProgress} onChange={(e) => seekAudio(parseFloat(e.target.value))} className="audio-progress flex-1" style={{ '--progress': `${progressPercent}%` }} />
                <span className="text-xs font-mono text-stone-600 dark:text-amber-300">{formatTime(audioDuration)}</span>
              </div>
              <div className="hidden md:flex items-center gap-2">
                <i className="fa-solid fa-volume-low text-stone-500 text-sm"></i>
                <input type="range" min="0" max="1" step="0.01" value={audioVolume} onChange={(e) => setVolume(parseFloat(e.target.value))} className="volume-slider w-20" />
              </div>
              <button onClick={() => setExpanded(!expanded)} className="sm:hidden w-8 h-8 rounded-full bg-stone-200 dark:bg-stone-700 flex items-center justify-center"><i className={`fa-solid fa-chevron-${expanded ? 'down' : 'up'} text-xs`}></i></button>
            </div>
            {expanded && (
              <div className="mt-3 flex flex-col gap-2 sm:hidden">
                <div className="flex items-center gap-2">
                  <span className="text-xs font-mono text-stone-600 dark:text-amber-300">{formatTime(audioProgress)}</span>
                  <input type="range" min="0" max={audioDuration || 0} value={audioProgress} onChange={(e) => seekAudio(parseFloat(e.target.value))} className="audio-progress flex-1" style={{ '--progress': `${progressPercent}%` }} />
                  <span className="text-xs font-mono text-stone-600 dark:text-amber-300">{formatTime(audioDuration)}</span>
                </div>

    // Lightbox with enhanced video player (Picture-in-Picture & speed)
    const Lightbox = () => {
      const { 
        lightboxOpen, currentGallery, currentPhotoIndex, nextImage, prevImage, closeLightbox, 
        toggleSlideshow, slideshowInterval, toggleFavorite, favorites, deleteCurrentImage, 
        uploadedMedia, activeAlbum, deletedMedia, zoomScale, zoomTranslate, setZoomTranslate,
        handleZoomIn, handleZoomOut, handleZoomReset, containerRef
      } = useContext(AppContext);
      
      const [isDragging, setIsDragging] = useState(false);
      const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
      // video player state
      const [videoPlaying, setVideoPlaying] = useState(false);
      const [videoProgress, setVideoProgress] = useState(0);
      const [videoDuration, setVideoDuration] = useState(0);
      const [videoVolume, setVideoVolume] = useState(1);
      const [playbackRate, setPlaybackRate] = useState(1.0);
      const videoRef = useRef(null);

      useEffect(() => {
        return () => { setIsDragging(false); if (videoRef.current) videoRef.current.pause(); };
      }, []);

      if (!lightboxOpen) return null;
      
      const filename = currentGallery[currentPhotoIndex];
      if (!filename) return null;
      let src;
      const inTrash = activeAlbum === 'Trash';
      const media = uploadedMedia.find(m => m.filename === filename);
      if (inTrash) {
        const deleted = deletedMedia.find(d => d.filename === filename);
        src = deleted ? deleted.dataURL : `${PATH_TO_IMAGES}${filename}`;
      } else {
        src = media ? media.dataURL : `${PATH_TO_IMAGES}${filename}`;
      }
      const isVideo = media?.type === 'video' || filename?.toLowerCase().endsWith('.mp4');
      const isFav = favorites.has(filename);
      const showDelete = (uploadedMedia.some(i => i.filename === filename) || inTrash) && activeAlbum !== 'Trash';

      // drag handlers for zoom
      const handleMouseDown = (e) => {
        if (zoomScale <= 1) return;
        e.preventDefault();
        setIsDragging(true);
        setDragStart({ x: e.clientX - zoomTranslate.x, y: e.clientY - zoomTranslate.y });
      };
      const handleMouseMove = (e) => {
        if (!isDragging) return;
        e.preventDefault();
        setZoomTranslate({
          x: e.clientX - dragStart.x,
          y: e.clientY - dragStart.y
        });
      };
      const handleMouseUp = () => setIsDragging(false);
      const handleDoubleClick = (e) => {
        e.preventDefault();
        if (zoomScale > 1) handleZoomReset();
        else handleZoomIn(e.clientX, e.clientY);
      };

      // video controls
      const toggleVideoPlay = () => {
        if (!videoRef.current) return;
        if (videoPlaying) videoRef.current.pause();
        else videoRef.current.play();
        setVideoPlaying(!videoPlaying);
      };
      const handleVideoTimeUpdate = () => {
        if (videoRef.current) {
          setVideoProgress(videoRef.current.currentTime);
          setVideoDuration(videoRef.current.duration);
        }
      };
      const seekVideo = (time) => { if (videoRef.current) videoRef.current.currentTime = time; };
      const handleVideoVolume = (vol) => { setVideoVolume(vol); if (videoRef.current) videoRef.current.volume = vol; };
      const togglePiP = async () => {
        if (videoRef.current) {
          if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
          } else {
            await videoRef.current.requestPictureInPicture();
          }
        }
      };
      const changePlaybackRate = (rate) => {
        setPlaybackRate(rate);
        if (videoRef.current) videoRef.current.playbackRate = rate;
      };

      return (
        <div 
          className="fixed inset-0 z-50 bg-stone-950/95 backdrop-blur-md flex items-center justify-center transition-opacity duration-300 select-none" 
          onClick={closeLightbox}
          onMouseMove={handleMouseMove}
          onMouseUp={handleMouseUp}
          onMouseLeave={handleMouseUp}
        >
          <div className="absolute top-0 left-0 w-full h-1 bg-white/10 z-50">
            <div key={currentPhotoIndex} className={`h-full bg-amber-500 ${slideshowInterval ? 'animate-progress' : 'w-0'}`} style={{ width: slideshowInterval ? '100%' : '0' }}></div>
          </div>

          <div className="absolute top-0 left-0 w-full p-4 flex justify-between items-center z-50 pointer-events-none">
            <span className="text-white/80 font-mono text-xs pointer-events-auto bg-white/10 border border-white/10 px-3 py-1.5 rounded-full backdrop-blur-md">
              {currentPhotoIndex+1} / {currentGallery.length}
            </span>
            <div className="flex items-center gap-2 pointer-events-auto">
              <button onClick={toggleSlideshow} className="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 border border-white/10 text-white transition"><i className={`fa-solid ${slideshowInterval ? 'fa-pause' : 'fa-play'} text-sm`}></i></button>
              <button onClick={() => toggleFavorite(filename)} className="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 border border-white/10 text-white transition"><i className={`fa-${isFav ? 'solid text-red-500' : 'regular'} fa-heart text-lg`}></i></button>
              {showDelete && <button onClick={deleteCurrentImage} className="w-10 h-10 rounded-full bg-white/10 hover:bg-red-500/80 border border-white/10 text-white transition"><i className="fa-solid fa-trash text-sm"></i></button>}
              <button onClick={() => { const a = document.createElement('a'); a.href = src; a.download = filename; a.click(); }} className="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 border border-white/10 text-white transition"><i className="fa-solid fa-download text-sm"></i></button>
              <button onClick={closeLightbox} className="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 border border-white/10 text-white transition"><i className="fa-solid fa-xmark"></i></button>
            </div>
          </div>

          <div className="absolute left-1/2 -translate-x-1/2 bottom-6 flex items-center gap-2 z-50 bg-black/40 backdrop-blur-md rounded-full px-3 py-2 border border-white/10">
            <button onClick={handleZoomOut} className="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 text-white text-sm">−</button>
            <span className="text-white text-xs px-1">{Math.round(zoomScale * 100)}%</span>
            <button onClick={handleZoomIn} className="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 text-white text-sm">+</button>
            <button onClick={handleZoomReset} className="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 text-white text-xs ml-1"><i className="fa-solid fa-arrows-to-circle"></i></button>
          </div>

          <button onClick={(e) => { e.stopPropagation(); prevImage(); }} className="absolute left-3 sm:left-6 top-1/2 -translate-y-1/2 w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-white/10 hover:bg-white/20 border border-white/10 text-white flex items-center justify-center z-50 backdrop-blur-md transition group active:scale-95"><i className="fa-solid fa-chevron-left text-xl group-hover:-translate-x-0.5 transition-transform"></i></button>
          <button onClick={(e) => { e.stopPropagation(); nextImage(); }} className="absolute right-3 sm:right-6 top-1/2 -translate-y-1/2 w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-white/10 hover:bg-white/20 border border-white/10 text-white flex items-center justify-center z-50 backdrop-blur-md transition group active:scale-95"><i className="fa-solid fa-chevron-right text-xl group-hover:translate-x-0.5 transition-transform"></i></button>

          <div 
            className="relative w-full h-full flex items-center justify-center p-4 sm:px-20 overflow-hidden"
            onClick={e => e.stopPropagation()}
            ref={containerRef}
          >
            {isVideo ? (
              <div className="relative max-h-[90vh] max-w-[90vw] rounded-lg shadow-2xl shadow-black/50 overflow-hidden">
                <video 
                  ref={videoRef}
                  src={src} 
                  className="max-h-[90vh] max-w-[90vw] object-contain"
                  onClick={toggleVideoPlay}
                  onTimeUpdate={handleVideoTimeUpdate}
                  onLoadedMetadata={handleVideoTimeUpdate}
                  onPlay={() => setVideoPlaying(true)}
                  onPause={() => setVideoPlaying(false)}
                  onEnded={() => setVideoPlaying(false)}
                />
                {/* Custom video controls with PiP and speed */}
                <div className="video-controls absolute bottom-0 left-0 w-full p-3 opacity-0 hover:opacity-100 transition-opacity">
                  <div className="flex items-center gap-2 text-white">
                    <button onClick={toggleVideoPlay} className="w-8 h-8 rounded-full bg-amber-600 hover:bg-amber-700 flex items-center justify-center">
                      <i className={`fa-solid ${videoPlaying ? 'fa-pause' : 'fa-play'} text-xs`}></i>
                    </button>
                    <span className="text-xs font-mono">{formatTime(videoProgress)}</span>
                    <input 
                      type="range" 
                      min="0" 
                      max={videoDuration || 0} 
                      value={videoProgress} 
                      onChange={(e) => seekVideo(parseFloat(e.target.value))}
                      className="video-progress flex-1"
                      style={{ '--value': `${(videoProgress / videoDuration) * 100}%` }}
                    />
                    <span className="text-xs font-mono">{formatTime(videoDuration)}</span>
                    <div className="flex items-center gap-1">
                      <i className="fa-solid fa-volume-high text-sm"></i>
                      <input type="range" min="0" max="1" step="0.01" value={videoVolume} onChange={(e) => handleVideoVolume(parseFloat(e.target.value))} className="volume-slider" />
                    </div>
                    <select value={playbackRate} onChange={(e) => changePlaybackRate(parseFloat(e.target.value))} className="bg-black/50 text-white text-xs rounded border border-white/20 p-1">
                      <option value="0.5">0.5x</option>
                      <option value="1">1x</option>
                      <option value="1.5">1.5x</option>
                      <option value="2">2x</option>
                    </select>
                    <button onClick={togglePiP} className="w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center">
                      <i className="fa-solid fa-clipboard text-xs"></i>
                    </button>
                    <button onClick={() => videoRef.current?.requestFullscreen()} className="w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center">
                      <i className="fa-solid fa-expand text-xs"></i>
                    </button>
                  </div>
                </div>
              </div>
            ) : (
              <div 
                className="zoom-container"
                style={{ transform: `scale(${zoomScale}) translate(${zoomTranslate.x}px, ${zoomTranslate.y}px)` }}
                onMouseDown={handleMouseDown}
                onDoubleClick={handleDoubleClick}
              >
                <img src={src} alt="" className="max-h-[90vh] max-w-[90vw] object-contain rounded-lg shadow-2xl shadow-black/50 select-none" draggable="false" />
              </div>
            )}
            <div className="absolute bottom-8 text-center w-full px-12 pointer-events-none">
              <span className="inline-block bg-black/40 border border-white/10 text-white/90 px-4 py-2 rounded-full text-xs backdrop-blur-md font-mono truncate max-w-[90%]">{filename}</span>
            </div>
          </div>
        </div>
      );
    };

    const Toast = ({ show, msg, type }) => { 
      if (!show) return null; 
      const bg = type === 'success' ? 'bg-emerald-700/95' : 'bg-rose-700/95'; 
      return (<div className={`fixed ${type === 'success' ? 'bottom-6' : 'top-6'} left-1/2 -translate-x-1/2 ${bg} text-white px-6 py-3 rounded-full shadow-2xl backdrop-blur-md flex items-center gap-3 transition-all duration-500 z-[80]`}><i className={`fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-circle-exclamation'}`}></i><span className="font-bold text-xs">{msg}</span></div>); 
    };

    const Footer = () => {
      const { getAllVisiblePhotos, favorites, deletedMedia } = useContext(AppContext);
      const total = getAllVisiblePhotos().length;
      return (
        <footer className="w-full py-8 mt-auto border-t border-amber-200 dark:border-amber-900/30 text-center">
          <div className="flex flex-col items-center gap-1">
            <span className="text-sm font-semibold text-stone-900 dark:text-amber-100">{total} Items · {favorites.size} Favorites · Trash {deletedMedia.length}</span>
            <span className="text-[10px] font-medium text-stone-400 uppercase tracking-wider">Nova Gallery · Imperial Edition</span>
          </div>
        </footer>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
